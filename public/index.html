<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TUS Upload Client</title>
  <script src="https://cdn.jsdelivr.net/npm/tus-js-client@latest/dist/tus.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; display: flex; justify-content: center; padding: 40px 16px; }
    .card { background: white; border-radius: 10px; padding: 32px; width: 100%; max-width: 560px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    h1 { font-size: 1.4rem; margin-bottom: 24px; color: #111; }
    label { display: block; font-size: 0.85rem; font-weight: 600; color: #444; margin-bottom: 6px; }
    input[type="file"] { display: block; width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 16px; background: #fafafa; cursor: pointer; }
    .chunk-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
    .chunk-row input[type="number"] { width: 120px; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; }
    .chunk-row span { font-size: 0.85rem; color: #666; }
    .btn-row { display: flex; gap: 10px; margin-bottom: 24px; }
    button { padding: 10px 20px; border: none; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: opacity .15s; }
    button:disabled { opacity: .45; cursor: not-allowed; }
    #btnUpload { background: #2563eb; color: white; }
    #btnPause  { background: #f59e0b; color: white; }
    #btnResume { background: #10b981; color: white; }
    #btnAbort  { background: #ef4444; color: white; }
    .progress-wrap { background: #e5e7eb; border-radius: 999px; height: 10px; margin-bottom: 10px; overflow: hidden; }
    .progress-bar  { height: 100%; background: #2563eb; width: 0%; transition: width .3s; border-radius: 999px; }
    #status { font-size: 0.88rem; color: #555; min-height: 1.4em; }
    #uploadUrl { font-size: 0.8rem; color: #2563eb; word-break: break-all; margin-top: 8px; display: none; }
    #uploadUrl a { color: inherit; }
  </style>
</head>
<body>
<div class="card">
  <h1>TUS Upload Tester</h1>

  <label for="fileInput">Select file</label>
  <input type="file" id="fileInput" />

  <div class="chunk-row">
    <label for="chunkSize" style="margin:0">Chunk size (bytes)</label>
    <input type="number" id="chunkSize" value="5242880" min="65536" step="1024" />
    <span>(default 5 MB)</span>
  </div>

  <div class="btn-row">
    <button id="btnUpload">Upload</button>
    <button id="btnPause"  disabled>Pause</button>
    <button id="btnResume" disabled>Resume</button>
    <button id="btnAbort"  disabled>Abort</button>
  </div>

  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
  <div id="status">Select a file and click Upload.</div>
  <div id="uploadUrl"></div>
</div>

<script>
  const ENDPOINT = 'http://localhost:3000/upload/files';

  const fileInput  = document.getElementById('fileInput');
  const chunkInput = document.getElementById('chunkSize');
  const btnUpload  = document.getElementById('btnUpload');
  const btnPause   = document.getElementById('btnPause');
  const btnResume  = document.getElementById('btnResume');
  const btnAbort   = document.getElementById('btnAbort');
  const progressBar = document.getElementById('progressBar');
  const statusEl   = document.getElementById('status');
  const uploadUrlEl = document.getElementById('uploadUrl');

  let currentUpload = null;

  function setStatus(msg, color = '#555') {
    statusEl.textContent = msg;
    statusEl.style.color = color;
  }

  function setProgress(pct) {
    progressBar.style.width = pct + '%';
  }

  function updateButtons(state) {
    // state: idle | uploading | paused | done
    btnUpload.disabled = state !== 'idle';
    btnPause.disabled  = state !== 'uploading';
    btnResume.disabled = state !== 'paused';
    btnAbort.disabled  = state === 'idle' || state === 'done';
  }

  btnUpload.addEventListener('click', () => {
    const file = fileInput.files[0];
    if (!file) { setStatus('Please select a file first.', '#ef4444'); return; }

    uploadUrlEl.style.display = 'none';
    setProgress(0);
    setStatus('Starting upload…');
    updateButtons('uploading');

    const chunkSize = parseInt(chunkInput.value, 10) || 5 * 1024 * 1024;

    currentUpload = new tus.Upload(file, {
      endpoint: ENDPOINT,
      retryDelays: [0, 1000, 3000, 5000],
      chunkSize,
      removeFingerprintOnSuccess: true,
      metadata: {
        filename: file.name,
        filetype: file.type,
      },
      onError(err) {
        console.error('Upload error:', err);
        setStatus('Error: ' + err.message, '#ef4444');
        updateButtons('idle');
        currentUpload = null;
      },
      onProgress(bytesUploaded, bytesTotal) {
        const pct = ((bytesUploaded / bytesTotal) * 100).toFixed(1);
        setProgress(pct);
        setStatus(`Uploading… ${pct}% (${fmt(bytesUploaded)} / ${fmt(bytesTotal)})`);
      },
      onSuccess() {
        setProgress(100);
        setStatus('Upload complete!', '#10b981');
        uploadUrlEl.innerHTML = 'URL: <a href="' + currentUpload.url + '" target="_blank">' + currentUpload.url + '</a>';
        uploadUrlEl.style.display = 'block';
        updateButtons('done');
        currentUpload = null;
      },
    });

    // Check for a previous upload to resume
    currentUpload.findPreviousUploads().then(prev => {
      if (prev.length > 0) {
        const resume = confirm(`Found ${prev.length} previous upload(s) for this file. Resume the latest?`);
        if (resume) currentUpload.resumeFromPreviousUpload(prev[0]);
      }
      currentUpload.start();
    });
  });

  btnPause.addEventListener('click', () => {
    if (!currentUpload) return;
    currentUpload.abort();
    setStatus('Paused.', '#f59e0b');
    updateButtons('paused');
  });

  btnResume.addEventListener('click', () => {
    if (!currentUpload) return;
    updateButtons('uploading');
    setStatus('Resuming…');
    currentUpload.start();
  });

  btnAbort.addEventListener('click', () => {
    if (!currentUpload) return;
    currentUpload.abort(true); // terminate on server too
    setStatus('Upload aborted.', '#ef4444');
    setProgress(0);
    updateButtons('idle');
    currentUpload = null;
  });

  function fmt(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
  }
</script>
</body>
</html>
